# Somna Agent Configuration
# All values here are overridden by CLI arguments if both are provided.
# Rename or copy this file — it is read automatically from the project root.

# LLM backend
model:    "HauhauCS_Qwen3.5-35B-A3B-Uncensored-HauhauCS-Aggressive"
api_key: ""
base_url: "http://localhost:8000"
                                        #   http://localhost:11434/v1  (Ollama)
                                        #   http://localhost:1234/v1   (LM Studio)

# Agent behaviour
mode:           "interactive"  # "observe" | "interactive"
interval:       20             # seconds between agent ticks
prompt_timeout: 120            # seconds user has to answer before dialog skips
max_history:    20             # max past exchanges kept in LLM context
startup_delay_s: 30            # seconds before first agent tick (180 for real sessions)

# Optional extra instructions appended to the system prompt.
# Use this to set the persona, focus area, or safety boundaries.
system_prompt: |
  Focus on the user's emotional and cognitive state.
  Prioritise deepening relaxation and receptivity.
  Never suggest stopping the session.

# ── Training / conditioning mode ────────────────────────────────────────────
# When enabled the agent treats response complexity as the primary depth
# metric, calibrates its prompting style to the target level, and injects
# good responses back into the affirmation pool as positive reinforcement.
training_mode:   false
training_target: 0.2    # 0.0 = very simple/regressed, 1.0 = fully alert

# Phrases flashed when the user's response scores near the training target.
# Extend or replace this list to match your session's tone.
praise_phrases:
  - "good girl"
  - "yes"
  - "perfect"
  - "that's right"
  - "keep going"
  - "just like that"

# ── Sampling parameters ──────────────────────────────────────────────────────
# Standard OpenAI params:
top_p:            0.8
presence_penalty: 1.5
# KoboldCpp extras (passed via extra_body — ignored by cloud APIs):
enable_thinking:  false   # set true only if you want reasoning traces
top_k:            20
min_p:            0.0
repeat_penalty:   1.0
# null = no cap (server / model decides). Set an int to hard-cap for safety on
# small-context models. For a 35B local model, leave null.
max_tokens_response: null

knowledge_files:
  - "gateway_process.md"
  - "session_design.md"
  - "veil_and_spirals.md"
  - "aphantasia.md"
  - "eeg_entrainment.md"
  - "confusion_induction.md"
  - "scramble_wakener.md"
  # faa_receptivity.md and adaptive_frequency_leading.md are auto-injected
  # when eeg.enabled is true — no need to list them here.

# ── Idle / planning mode (built into somna_agent.py) ─────────────────────────
# When no session is active the agent runs a planning cycle on this interval,
# handles nudges, and responds to console input at any time.
idle_planning_interval_min: 30   # minutes between idle LLM planning cycles
nudge_after_days:           1.0  # days overdue before a nudge fires
nudge_session:             "live" # session folder used for the nudge overlay
nudge_fade_minutes:        20    # minutes to ramp opacity from 5% → 60%

# ── Image generation (KoboldCpp / FLUX) ──────────────────────────────────────
# auto_image_gen: false means the agent will NEVER automatically call FLUX during
# a session or idle planning.  Set to true only if your GPU has enough VRAM to
# run both the LLM and FLUX simultaneously without OOM.  When false, use
# content_agent.py to generate images offline.
# Used by content_tools/images.py and the agent's _check_content_needs().
# Server URL is shared with the LLM (SOMNA_LLM_URL env var or base_url above).
whisper:
  enabled:  true
  language: "en"

fractionation:
  cycles:          3      # number of ascent/descent cycles
  ascent_hz_boost: 2.5    # Hz above current depth at the lighter state peak
  ascent_s:        35     # seconds to rise to the lighter state
  hold_s:          15     # seconds to hold at lighter state (contrast window)
  descent_s:       25     # seconds to drop back — faster than ascent by design
  pause_s:         25     # seconds to pause at new depth between cycles

# ── EEG / Biofeedback ────────────────────────────────────────────────────────
# eeg.enabled: false means the agent never tries to start EEGEngine.
# Set true when you want EEG context in the agent's system prompt.
# eeg.synthetic: true = BrainFlow SYNTHETIC_BOARD (Phase 0, no hardware needed).
# eeg.board_id: 39 = MUSE_S_BOARD (soft sleep headband, recommended over Muse 2
#   for lying-down sessions). Change to 38 (MUSE_2_BOARD) for Muse 2.
#   NEVER use 22 (MUSE_2_BLED_BOARD) — requires a $30 BLED112 dongle.
eeg:
  enabled:      true   # master enable; set true to inject EEG context into agent
  synthetic:    false    # false = real hardware
  board_id:     38      # 38 = MUSE_2_BOARD (native BLE); 22 = MUSE_2_BLED_BOARD (dongle)
  auto_connect: false   # auto-start EEG engine when the control panel opens

image_gen:
  steps:             8        # FLUX works well at 8 steps
  cfg_scale:         1.0      # FLUX ignores CFG > 1; keep at 1.0
  sampler:           "Euler"
  scheduler:         "Beta"   # or "simple"
  shift:             7        # recommended for FLUX
  width:             1024
  height:            1024
  default_style:     "anime"       # "photo" | "anime"
  default_intensity: "graphic"  # "mild" | "suggestive" | "explicit" | "graphic"
