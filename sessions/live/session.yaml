name: "Live — Agent-Driven Session"
description: >
  Freeform session with no scripted timeline.
  All parameters are held at their defaults and driven entirely by the
  LLM agent (somna_agent.py) in response to the user's state.
  Use this when you want the agent to be in full control, or when
  you want to manually adjust parameters in real-time via the control panel.
duration: 86400

defaults:
  beat_frequency: 10.0
  carrier_frequency: 200.0
  volume: 72.0
  spiral_style: fermat
  spiral_count: 5
  spiral_opacity: 80
  spiral_speed_multiplier: 1.0
  spiral_tightness: 6.5
  spiral_chaos: 0.06
  spiral_thickness: 13
  spiral_color_mode: rainbow
  veil_opacity: 20
  veil_mode: drift
  shadow_opacity: 0
  center_flash_on_time: 160
  center_flash_off_time: 300
  center_flash_sync_to_beat: false
  font_switch_mode: intelligent
  spiral_show_text: false
  phrases_active: general

# No timeline — the agent drives everything.
timeline: []
