name: "SSILD — Lucid Dreaming Protocol"
description: >
  EEG-guided SSILD (Senses-Initiated Lucid Dreaming) protocol (Bible Ch.7
  §§30-31). TTS-guided sensory cycling through sight, hearing, and touch,
  followed by REM monitoring with TLR subliminal cue delivery. Designed for
  WBTB (wake-back-to-bed) use after 4-6 hours of initial sleep.
category: ssild
type: ssild
duration: 1800

defaults:
  beat_frequency: 8.0
  beat_type: binaural
  carrier_frequency: 174.0
  volume: 25.0
  noise_color: "brown"
  noise_volume: 10
  bg_mode: "none"
  spiral_active: false
  veil_active: false
  center_text_active: false
  eeg_monitoring: true
  ssild_mode: true
  ssild_quick_cycles: 4
  ssild_slow_cycles: 3
  ssild_quick_sense_duration_s: 4.0
  ssild_slow_sense_duration_s: 20.0
  ssild_tlr_max_cues_per_rem: 3
  ssild_tlr_inter_cue_s: 60.0

keyframes: []
